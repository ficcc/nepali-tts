<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nepali TTS Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom scrollbar for text area */
      textarea::-webkit-scrollbar {
        width: 8px;
      }
      textarea::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
      }
      textarea::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      textarea::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Smooth transitions */
      .btn-transition {
        transition: all 0.2s ease-in-out;
      }
    </style>
  </head>
  <body
    class="bg-slate-50 min-h-screen font-sans text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-900"
  >
    <main class="max-w-3xl mx-auto px-4 py-12 sm:px-6 lg:px-8">
      <!-- Header -->
      <div class="text-center mb-10">
        <div
          class="inline-flex items-center justify-center p-3 bg-indigo-100 rounded-2xl mb-4"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="text-indigo-600"
          >
            <path d="M12 2v20"></path>
            <path d="M16 6v12"></path>
            <path d="M8 8v8"></path>
            <path d="M20 10v4"></path>
            <path d="M4 10v4"></path>
          </svg>
        </div>
        <h1
          class="text-4xl font-extrabold tracking-tight text-slate-900 sm:text-5xl mb-3"
        >
          Nepali TTS Studio
        </h1>
        <p class="text-lg text-slate-600 max-w-xl mx-auto">
          Convert Nepali text to natural-sounding speech and download the audio
          using the Google Gemini API.
        </p>
      </div>

      <!-- Main Card -->
      <div
        class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden"
      >
        <div class="p-6 sm:p-8 space-y-6">
          <!-- Error Message Container (Hidden by default) -->
          <div
            id="error-container"
            class="hidden bg-red-50 border-l-4 border-red-500 p-4 rounded-r-md"
          >
            <div class="flex items-start">
              <svg
                class="h-5 w-5 text-red-500 mt-0.5 mr-3 flex-shrink-0"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 20 20"
                fill="currentColor"
              >
                <path
                  fill-rule="evenodd"
                  d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                  clip-rule="evenodd"
                />
              </svg>
              <p
                id="error-text"
                class="text-sm text-red-700 font-medium whitespace-pre-wrap"
              ></p>
            </div>
          </div>

          <!-- API Key Section -->
          <div>
            <label
              for="api-key"
              class="block text-sm font-semibold text-slate-700 mb-1"
              >Gemini API Key</label
            >
            <p class="text-xs text-slate-500 mb-2">
              Get your free key from
              <a
                href="https://aistudio.google.com/app/apikey"
                target="_blank"
                class="text-indigo-600 hover:underline"
                >Google AI Studio</a
              >. Kept securely in your browser.
            </p>
            <input
              type="password"
              id="api-key"
              class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
              placeholder="AIzaSy..."
            />
          </div>

          <div class="h-px bg-slate-100 w-full my-6"></div>

          <!-- Voice and Speed Settings -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Voice Settings -->
            <div>
              <label
                for="voice-select"
                class="block text-sm font-semibold text-slate-700 mb-2"
                >Select Voice Profile</label
              >
              <div class="relative">
                <select
                  id="voice-select"
                  class="w-full appearance-none px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all cursor-pointer"
                >
                  <option value="Kore" selected>Kore (Firm / Clear)</option>
                  <option value="Aoede">Aoede (Breezy / Natural)</option>
                  <option value="Zephyr">Zephyr (Bright / Engaging)</option>
                  <option value="Puck">Puck (Upbeat)</option>
                  <option value="Fenrir">Fenrir (Excitable)</option>
                  <option value="Leda">Leda (Youthful)</option>
                </select>
                <div
                  class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500"
                >
                  <svg
                    class="h-4 w-4"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 20 20"
                    fill="currentColor"
                  >
                    <path
                      fill-rule="evenodd"
                      d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                      clip-rule="evenodd"
                    />
                  </svg>
                </div>
              </div>
            </div>

            <!-- Speed Settings -->
            <div>
              <label
                for="speed-select"
                class="block text-sm font-semibold text-slate-700 mb-2"
                >Voice Speed</label
              >
              <div class="relative">
                <select
                  id="speed-select"
                  class="w-full appearance-none px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all cursor-pointer"
                >
                  <option value="slowly and carefully">Slow</option>
                  <option value="naturally and clearly" selected>Normal</option>
                  <option value="quickly and briskly">Fast</option>
                </select>
                <div
                  class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500"
                >
                  <svg
                    class="h-4 w-4"
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 20 20"
                    fill="currentColor"
                  >
                    <path
                      fill-rule="evenodd"
                      d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
                      clip-rule="evenodd"
                    />
                  </svg>
                </div>
              </div>
            </div>
          </div>

          <!-- Text Input -->
          <div>
            <div class="flex justify-between items-end mb-2">
              <label
                for="text-input"
                class="block text-sm font-semibold text-slate-700"
                >Text to Convert (Nepali)</label
              >
              <button
                id="sample-text-btn"
                type="button"
                class="text-xs font-medium text-indigo-600 hover:text-indigo-800 hover:underline px-2 py-1 rounded-md transition-colors"
              >
                Insert Sample Text
              </button>
            </div>
            <textarea
              id="text-input"
              rows="4"
              class="w-full px-4 py-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all resize-none"
              placeholder="तपाईंको पाठ यहाँ टाइप गर्नुहोस्..."
            ></textarea>
          </div>

          <!-- Action Button -->
          <div class="pt-2">
            <button
              id="generate-btn"
              class="w-full flex items-center justify-center px-6 py-3.5 border border-transparent text-base font-semibold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 btn-transition shadow-sm"
            >
              <svg
                id="generate-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="mr-2"
              >
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
              </svg>

              <svg
                id="loading-spinner"
                class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden"
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
              >
                <circle
                  class="opacity-25"
                  cx="12"
                  cy="12"
                  r="10"
                  stroke="currentColor"
                  stroke-width="4"
                ></circle>
                <path
                  class="opacity-75"
                  fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
                ></path>
              </svg>
              <span id="generate-text">Generate Audio</span>
            </button>
            <p
              id="status-text"
              class="text-sm text-center text-slate-500 mt-3 h-5"
            ></p>
          </div>
        </div>

        <!-- Output Section (Hidden by default) -->
        <div
          id="output-section"
          class="bg-slate-50 border-t border-slate-200 p-6 sm:p-8 hidden"
        >
          <h3 class="text-sm font-semibold text-slate-700 mb-4">
            Generated Audio
          </h3>

          <div class="flex flex-col sm:flex-row items-center gap-4">
            <audio
              id="audio-player"
              controls
              class="w-full h-12 outline-none rounded-full"
            ></audio>

            <button
              id="download-btn"
              class="w-full sm:w-auto flex-shrink-0 inline-flex items-center justify-center px-5 py-3 border border-slate-300 shadow-sm text-sm font-medium rounded-xl text-slate-700 bg-white hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 btn-transition"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="mr-2 text-slate-500"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
              </svg>
              Download WAV
            </button>
          </div>
        </div>
      </div>
    </main>

    <script>
      // System instruction mapping for Canvas environment execution (Do not remove)
      const apiKey = ""

      // UI Elements
      const apiInput = document.getElementById("api-key")
      const textInput = document.getElementById("text-input")
      const voiceSelect = document.getElementById("voice-select")
      const speedSelect = document.getElementById("speed-select")
      const generateBtn = document.getElementById("generate-btn")
      const generateIcon = document.getElementById("generate-icon")
      const loadingSpinner = document.getElementById("loading-spinner")
      const generateText = document.getElementById("generate-text")
      const statusText = document.getElementById("status-text")
      const errorContainer = document.getElementById("error-container")
      const errorText = document.getElementById("error-text")
      const outputSection = document.getElementById("output-section")
      const audioPlayer = document.getElementById("audio-player")
      const downloadBtn = document.getElementById("download-btn")
      const sampleTextBtn = document.getElementById("sample-text-btn")

      let currentAudioBlobUrl = null

      // Sample Text Insertion
      sampleTextBtn.addEventListener("click", () => {
        textInput.value =
          "नमस्ते, यो नेपाली आवाज रूपान्तरण प्रणाली हो। यसले तपाईंको लेखेको पाठलाई प्राकृतिक आवाजमा बदल्छ।"
      })

      // PCM base64 string to WAV Blob conversion
      function base64ToWavBlob(base64Data, sampleRate) {
        // Decode Base64
        const binaryString = window.atob(base64Data)
        const pcmData = new Uint8Array(binaryString.length)
        for (let i = 0; i < binaryString.length; i++) {
          pcmData[i] = binaryString.charCodeAt(i)
        }

        // WAV format parameters (16-bit Mono PCM)
        const numChannels = 1
        const bitsPerSample = 16
        const byteRate = sampleRate * numChannels * (bitsPerSample / 8)
        const blockAlign = numChannels * (bitsPerSample / 8)

        const buffer = new ArrayBuffer(44 + pcmData.length)
        const view = new DataView(buffer)

        // Helper to write ASCII strings
        const writeString = (view, offset, string) => {
          for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i))
          }
        }

        // 1. "RIFF" chunk descriptor
        writeString(view, 0, "RIFF")
        view.setUint32(4, 36 + pcmData.length, true) // ChunkSize
        writeString(view, 8, "WAVE")

        // 2. "fmt " sub-chunk
        writeString(view, 12, "fmt ")
        view.setUint32(16, 16, true) // Subchunk1Size (16 for PCM)
        view.setUint16(20, 1, true) // AudioFormat (1 for PCM)
        view.setUint16(22, numChannels, true) // NumChannels
        view.setUint32(24, sampleRate, true) // SampleRate
        view.setUint32(28, byteRate, true) // ByteRate
        view.setUint16(32, blockAlign, true) // BlockAlign
        view.setUint16(34, bitsPerSample, true) // BitsPerSample

        // 3. "data" sub-chunk
        writeString(view, 36, "data")
        view.setUint32(40, pcmData.length, true) // Subchunk2Size

        // 4. Write PCM data points
        for (let i = 0; i < pcmData.length; i++) {
          view.setUint8(44 + i, pcmData[i])
        }

        return new Blob([view], { type: "audio/wav" })
      }

      // Fetch wrapper with Exponential Backoff
      async function fetchWithExponentialBackoff(url, options, maxRetries = 5) {
        const delays = [1000, 2000, 4000, 8000, 16000]
        let attempt = 0

        while (attempt <= maxRetries) {
          try {
            const response = await fetch(url, options)

            if (!response.ok) {
              const errorData = await response.json().catch(() => ({}))
              throw new Error(
                errorData.error?.message || `HTTP Error ${response.status}`,
              )
            }

            return await response.json()
          } catch (error) {
            if (attempt === maxRetries) {
              throw error
            }
            // Wait before retrying (exponential backoff)
            await new Promise((resolve) => setTimeout(resolve, delays[attempt]))
            attempt++
          }
        }
      }

      function showError(msg) {
        errorText.textContent = msg
        errorContainer.classList.remove("hidden")
      }

      function hideError() {
        errorContainer.classList.add("hidden")
        errorText.textContent = ""
      }

      // Generate Audio Handler
      generateBtn.addEventListener("click", async () => {
        const activeKey = apiInput.value.trim() || apiKey
        const textToSpeak = textInput.value.trim()
        const selectedVoice = voiceSelect.value
        const selectedSpeed = speedSelect.value

        hideError()

        if (!activeKey) {
          showError("Please enter your Gemini API Key.")
          apiInput.focus()
          return
        }

        if (!textToSpeak) {
          showError("Please enter some text to convert.")
          textInput.focus()
          return
        }

        // Set UI to loading state
        generateBtn.disabled = true
        generateBtn.classList.add("opacity-75", "cursor-not-allowed")
        generateIcon.classList.add("hidden")
        loadingSpinner.classList.remove("hidden")
        generateText.textContent = "Generating..."
        statusText.textContent =
          "Connecting to Gemini TTS... (this may take a few seconds)"
        outputSection.classList.add("hidden")

        // Clean up previous blob URL if exists
        if (currentAudioBlobUrl) {
          URL.revokeObjectURL(currentAudioBlobUrl)
          currentAudioBlobUrl = null
        }

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${activeKey}`

        // The structured prompt to force the LLM to only output spoken text in Nepali
        const payload = {
          contents: [
            {
              parts: [
                {
                  text: `Read the following text strictly in Nepali language. Speak ${selectedSpeed}. Do not add any conversational remarks, translations, or english introductions. Just read the text exactly as provided. Text to read: ${textToSpeak}`,
                },
              ],
            },
          ],
          generationConfig: {
            responseModalities: ["AUDIO"],
            speechConfig: {
              voiceConfig: {
                prebuiltVoiceConfig: {
                  voiceName: selectedVoice,
                },
              },
            },
          },
          model: "gemini-2.5-flash-preview-tts",
        }

        try {
          const responseData = await fetchWithExponentialBackoff(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          })

          const part = responseData.candidates?.[0]?.content?.parts?.[0]

          if (!part || !part.inlineData || !part.inlineData.data) {
            throw new Error(
              "No audio data returned. The API might have rejected the prompt or the response was malformed.",
            )
          }

          const base64Audio = part.inlineData.data
          const mimeType = part.inlineData.mimeType || ""

          // Extract sample rate from mimetype if provided, otherwise default to 24000
          let sampleRate = 24000
          const rateMatch = mimeType.match(/rate=(\d+)/)
          if (rateMatch && rateMatch[1]) {
            sampleRate = parseInt(rateMatch[1], 10)
          }

          // Convert to WAV
          const wavBlob = base64ToWavBlob(base64Audio, sampleRate)
          currentAudioBlobUrl = URL.createObjectURL(wavBlob)

          // Update UI with audio
          audioPlayer.src = currentAudioBlobUrl
          outputSection.classList.remove("hidden")

          // Set up Download Button
          downloadBtn.onclick = () => {
            const a = document.createElement("a")
            a.href = currentAudioBlobUrl
            a.download = `nepali-tts-${Date.now()}.wav`
            document.body.appendChild(a)
            a.click()
            document.body.removeChild(a)
          }

          statusText.textContent = "Audio generated successfully!"
        } catch (err) {
          showError(err.message)
          statusText.textContent = ""
        } finally {
          // Reset UI state
          generateBtn.disabled = false
          generateBtn.classList.remove("opacity-75", "cursor-not-allowed")
          generateIcon.classList.remove("hidden")
          loadingSpinner.classList.add("hidden")
          generateText.textContent = "Generate Audio"

          if (!errorContainer.classList.contains("hidden")) {
            statusText.textContent = "Generation failed."
          }
        }
      })
    </script>
  </body>
</html>
